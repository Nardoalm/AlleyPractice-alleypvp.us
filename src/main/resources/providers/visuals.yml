action-bars:
  health-indicator:
    message-format: '{name-color}{target} {health-bar}'
    symbol:
      appearance: ❤
      color:
        full: '&4&l'
        half: '&c&l'
        empty: '&7&l'
  queue-indicator:
    enabled: true
    message-format: '&6{queue-type} {kit-name} &7│ &f{elapsed-time}'
  death-message:
    enabled: true
    format: '&c&lKILL! &f{victim-name-color}{victim}'
titles:
  join-message:
    enabled: true
    header: '&6&lKaos Practice'
    subheader: '&fFeito por: &6ysubz '
    fade-in: 10
    stay: 40
    fade-out: 10
  match-starting:
    enabled: true
    header: '&a&l{colored-stage-bold}'
    footer: ''
    fade-in: 0
    stay: 23
    fade-out: 5
  match-restarting-round:
    enabled: true
    header: '&a&l{colored-stage-bold}'
    footer: ''
    fade-in: 0
    stay: 23
    fade-out: 20
  match-started:
    enabled: true
    header: '&6&lPartida iniciada'
    footer: '&fBoa sorte!'
    fade-in: 0
    stay: 25
    fade-out: 20
  match-respawning:
    enabled: true
    header: '&c&lVOCÊ MORREU!'
    footer: '&fRenascendo em &6{seconds}&f...'
    fade-in: 0
    stay: 23
    fade-out: 0
  match-respawned:
    enabled: true
  match-victory:
    header: '&a&lVITÓRIA!'
    footer: '&a{winner} &fvenceu a partida!'
    fade-in: 0
    stay: 20
    fade-out: 20
  match-defeat:
    enabled: true
    header: '&c&lDERROTA!'
    footer: '&c{winner} &fvenceu a partida!'
    fade-in: 0
    stay: 20
    fade-out: 20
  team-scored:
    enabled: true
    header: '{winner-color}&l{scorer} &fmarcou!'
    footer: '&r{winner-color}{current-score} &7- &r{loser-color}{opponent-current-score}'
    fade-in: 0
    stay: 15
    fade-out: 5
  checkpoint:
    enabled: true
    header: '&aCHECKPOINT!'
    footer: '&7({x}, {y}, {z})'
    fade-in: 10
    stay: 20
    fade-out: 20
  match-bed-destroyed:
    enabled: true
    header: '&c&lCAMA DESTRUÍDA!'
    footer: '&fVocê não irá mais renascer!'
    fade-in: 10
    stay: 60
    fade-out: 10
  match-seekers-released:
    enabled: true
    header: '&c&lPROCURADORES LIBERADOS!'
    footer: '&fA caçada começou!'
    fade-in: 10
    stay: 40
    fade-out: 20
  camp-protection:
    enabled: true
    header: '&c&lPROTEÇÃO ANTI-CAMPER'
    footer: '&fVocê receberá dano em &6{seconds} &fsegundos!'
    fade-in: 0
    stay: 23
    fade-out: 20
  camp-protection-taking-damage:
    enabled: true
    header: '&c&lRECEBENDO DANO!'
    footer: '&fDesça!'
    fade-in: 0
    stay: 23
    fade-out: 20
  party-left:
    enabled: true
    header: '&c&l✖ Left {leader}''s Party'
    footer: '&7Você saiu da sua party.'
    fade-in: 5
    stay: 15
    fade-out: 5
  party-joined:
    enabled: true
    header: '&a&l⚔ Joined {leader}''s Party'
    footer: '&7Digite /p para ajuda.'
    fade-in: 5
    stay: 15
    fade-out: 5
  party-disbanded:
    enabled: true
    header: '&c&l✖ Party Desfeita'
    footer: '&7Você desfez sua party.'
    fade-in: 5
    stay: 15
    fade-out: 5
  party-created:
    enabled: true
    header: '&a&l⚔ Party Criada'
    footer: '&7Digite /p para ajuda.'
    fade-in: 5
    stay: 15
    fade-out: 5
