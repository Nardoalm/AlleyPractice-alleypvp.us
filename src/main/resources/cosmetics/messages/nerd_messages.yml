ENTITY_ATTACK:
  - "{killer} executou `taskkill /IM {victim}.exe /F`."
FALL:
  - "{victim} encontrou um erro fatal na engine de física, induzido por {killer}."
VOID:
  - "{victim} foi lançado ao void por {killer} e coletado pelo garbage collector."
LAVA:
  - "{killer} decidiu que a CPU de {victim} precisava de um teste de estresse térmico."
GENERIC:
  - "Exceção não tratada: {victim} não conseguiu lidar com {killer}."
