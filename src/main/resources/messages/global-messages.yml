tips:
  - '&bTip: &fThe Void is a lonely place. Try not to visit it anytime soon.'
  - '&bTip: &fIf the combo is too long, maybe it''s time to accept your fate.'
  - '&bTip: &fStrafing isn''t dancing, but if you do it right, your opponent will get dizzy.'
  - '&bTip: &fBlocks are meant for building, but they work even better to trap your enemy.'
  - '&bTip: &fEating a Golden Apple before the fight helps. Eating after is just a snack.'
  - '&bTip: &fS-tapping is a thing. Use it to avoid becoming a flying punching bag.'
  - '&bTip: &fSpeed bridging is an art, falling off in the middle of it is entertainment for others.'
  - '&bTip: &fIf you see a skinless Steve running towards you... run.'
  - '&bTip: &fMinecraft physics are optional, but fall damage is very real.'
  - '&bTip: &fHitbox is life. Learn where it ends and where your suffering begins.'
  - '&bTip: &fHaving 20 CPS is good, but knowing where you are looking is fundamental.'
  - '&bTip: &fStrength potions don''t compensate for a lack of skill, but they help mask it.'
  - '&bTip: &fIf the opponent is standing still, either they disconnected or you are already dead and don''t know it.'
  - '&bTip: &fKB (Knockback) is a two-way street. Be careful not to end up as the passenger.'
  - '&bTip: &fA messy inventory is the first step toward an early respawn.'
  - '&bTip: &fProjectiles aren''t just for damage; they are great for breaking your enemy''s rhythm.'
  - '&bTip: &fSprinting in a straight line is the fastest way to get hit by an arrow.'
  - '&bTip: &fThe 3-block reach distance is your best friend. Don''t let anyone break that friendship.'
  - '&bTip: &fIf you are reading this while playing, you probably just got comboed.'
  - '&bTip: &fThe Shift button isn''t just for fake friendships; use it so you don''t fall.'
