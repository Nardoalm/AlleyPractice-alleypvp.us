duel-requests:
  accepted: '&aVocê aceitou o pedido de duelo de &6{name-color}{player}&a!'
duel:
  request:
    sent:
      solo:
        format:
          - ''
          - '&6&lPedido de Duelo'
          - ' &6&l│ &fAlvo: &6{name-color}{target}'
          - ' &6&l│ &fKit: &6{kit}'
          - ' &6&l│ &fArena: &6{arena}'
          - ''
      party:
        format:
          - ''
          - '&6&lPedido de Duelo de Party'
          - ' &6&l│ &fAlvo: &6{name-color}{target}&f da Party &6(&a{party-size}&6)'
          - ' &6&l│ &fKit: &6{kit}'
          - ' &6&l│ &fArena: &6{arena}'
          - ''
    received:
      solo:
        clickable:
          format: ' &a(Clique para aceitar)'
          command: /accept {sender}
          hover: '&aClique para aceitar &6{sender}&a pedido de duelo.'
        format:
          - ''
          - '&6&lPedido de Duelo'
          - ' &6&l│ &fDe: &6{name-color}{sender}'
          - ' &6&l│ &fArena: &6{arena}'
          - ' &6&l│ &fKit: &6{kit}'
          - '{clickable}'
          - ''
      party:
        clickable:
          format: ' &a(Clique para aceitar)'
          command: /accept {sender}
          hover: '&aClique para aceitar o pedido de duelo de party de &6{sender}&a.'
        format:
          - ''
          - '&6&lPedido de Duelo de Party'
          - ' &6&l│ &fDe: &6{name-color}{sender}&f da Party &6(&a{party-size}&6)'
          - ' &6&l│ &fArena: &6{arena}'
          - ' &6&l│ &fKit: &6{kit}'
          - '{clickable}'
          - ''
    expired:
      sender:
        enabled: true
        format:
          - ''
          - '&c&lPedido de Duelo Expirado'
          - ' &c&l│ &fSeu pedido de duelo para &6{target} &fexpirou.'
          - ''
      target:
        enabled: true
        format:
          - ''
          - '&c&lPedido de Duelo Expirado'
          - ' &c&l│ &fO pedido de duelo de &6{sender} &fexpirou.'
          - ''
ffa:
  killstreak-alert:
    enabled: true
    interval: 5
    message:
      - ''
      - '&6&lSequência de Abates'
      - ' &6&l│ &f{name-color}{player} &festá em uma sequência de &6{killstreak} &fabates!'
      - ''
  combat-log:
    death-message: '&7(Combat Log) &c{name-color}{player} &ffoi morto por &c{killer-name-color}{killer}&f.'
  teleported-to-safe-zone: '&aVocê foi teleportado para a zona segura.'
  player:
    join-message:
      enabled: false
      format:
        - '&a{name-color}{player} &aentrou na partida de FFA.'
    left-message:
      enabled: false
      format:
        - '&c{name-color}{player} &csaiu da partida de FFA.'
    death:
      no-killer-message:
        enabled: true
        format:
          - '&c{name-color}{player} &fmorreu!'
      killed-message:
        enabled: true
        format:
          - '&c{name-color}{player} &ffoi morto por &c{killer-name-color}{killer}&f!'
game:
  cannot-drop-sword: '&cVocê não pode dropar sua espada!'
match:
  death-message:
    generic: '&c&lMORTE! &f{name-color}{player} &fmorreu.'
    generic-killer: '&c&lMORTO! &f{name-color}{victim} &ffoi morto por &c{killer-name-color}{killer}&f.'
    custom: '&c&lMORTO! &f{message}'
  seeker-respawned: '&c&lMORTE! &fO seeker &c{name-color}{player} &frenasceu.'
  started:
    kit-disclaimer:
      enabled: true
      format:
        - ''
        - '&6&l{kit-name}'
        - ' &6&l│ &f{kit-disclaimer}'
        - ''
    message:
      regular:
        enabled: true
        format:
          - '&aA partida começou!'
      round:
        enabled: true
        format:
          - '&aA rodada &6{current-round} &acomeçou.'
  elevator:
    no-safe-spot-found: '&cNão há um local seguro para teleporte!'
  cannot-interact-during-match: '&cVocê não pode interagir com isso durante uma partida!'
  cannot-interact-as-raider: '&cVocê não pode interagir com isso como raider!'
  cannot-place-blocks-during-hiding-phase: '&cVocê não pode colocar blocos durante a fase de esconder!'
  cannot-place-blocks-above-height-limit: '&cVocê não pode colocar blocos acima do limite de altura!'
  cannot-build-near-portal: '&cVocê não pode construir perto de um portal!'
  cannot-break-blocks-during-hiding-phase: '&cVocê não pode quebrar blocos durante a fase de esconder!'
  cannot-break-own-bed: '&cVocê não pode quebrar sua própria cama!'
  starting:
    message:
      enabled: true
      format:
        - '&a{stage}...'
  round-starting:
    message:
      enabled: true
      format:
        - '&a{stage}...'
  respawning:
    message:
      enabled: true
      format:
        - '&a{seconds}...'
  ending:
    time-limit-exceeded:
      format:
        - '&cA partida terminou por atingir o limite de tempo de &6{time-limit} minutos&c.'
  scored:
    enabled: true
    format:
      solo:
        - ''
        - '{winner-color}&l{scorer} &6&lmarcou!'
        - '{winner-color}&l{winner-goals} &7- {loser-color}&l{loser-goals}'
        - ''
      team:
        - ''
        - '{winner-color}&lTime de {winner} &6&lmarcou!'
        - '{winner-color}&l{winner-goals} &7- {loser-color}&l{loser-goals}'
        - ''
  bed-destruction:
    enabled: true
    format:
      - ''
      - '&6&lCAMA DESTRUÍDA! &6{bed-color}{bed} &ffoi destruída por &6{breaker-color}{breaker}&f!'
      - ''
  ended:
    spectators-list:
      - '&6&lEspectadores: &f{spectators} &7(e mais &6{more_count} &7...)'
    match-result:
      regular:
        format:
          - ''
          - '&6&lResultados da Partida: &7(clique para ver)'
          - '&aVencedor: &f{winner} &7| &cPerdedor: &f{loser}'
          - ''
        winner:
          command: /inventory {winner}
          hover: '&aClique para ver {winner} inventário'
        loser:
          command: /inventory {loser}
          hover: '&cClique para ver {loser} inventário'
    elo-changes:
      enabled: true
      format:
        - '&6&lMudanças de Elo'
        - ' &6&l│ &f{winner} &a+{math-winner-elo} &7(&f{old-winner-elo} &7-> &f{new-winner-elo})'
        - ' &6&l│ &f{loser} &c-{math-loser-elo} &7(&f{old-loser-elo} &7-> &f{new-loser-elo})'
        - ''
  blocks-reset:
    enabled: true
    format:
      - '&4{name-color}{player} &fresolveu resetar os blocos!'
  platform-decay:
    will-no-longer-decay:
      - '&c&lA plataforma não irá mais decair!'
    notifications:
      '75':
        format:
          - '&6A arena começou a desmoronar...'
      '50':
        format:
          - '&e&lAVISO! &eA arena encolheu pela metade!'
      '25':
        format:
          - '&c&lPERIGO! &cA plataforma está colapsando rápido!'
  versus-message:
    solo:
      enabled: true
      format:
        - '&7[&6Partida&7] &6{playerA} &avs &6{playerB}'
    team:
      enabled: true
      format:
        - '&7[&6Partida&7] &6{teamA-leader} (Time) &7(&a{teamA-size}&7) &avs &6{teamB-leader} (Time) &7(&a{teamB-size}&7)'
party:
  invitation:
    received:
      clickable:
        format: ' &a(Clique para aceitar)'
        command: /party accept {sender}
        hover: '&aClique para aceitar o convite de party de &6{sender}&a.'
      format:
        - ''
        - '&6&lConvite de Party'
        - ' &6&l│ &fDe: &6{name-color}{sender}'
        - ' &6&l│ &fJogadores: &6{party-size}&f/&6N/D'
        - '{clickable}'
        - ''
    sent:
      format:
        - ''
        - '&6&lConvite de Party Enviado'
        - ' &6&l│ &fAlvo: &6{name-color}{target}'
        - ''
  announcement:
    clickable:
      format: ' &a(Clique para entrar)'
      command: /party join {leader}
      hover: '&aClique para entrar na party de &6{leader}&a.'
    format:
      - ''
      - '&6&lConvite Público de Party'
      - ' &6&l│ &fLíder: &6{name-color}{leader}'
      - ' &6&l│ &fJogadores: &6{party-size}&f/&6N/D'
      - '{clickable}'
      - ''
  request:
    expired:
      sender:
        enabled: true
        format:
          - ''
          - '&c&lPedido de Party Expirado'
          - ' &c&l│ &fSeu pedido de party para &6{target} &fexpirou.'
          - ''
      target:
        enabled: true
        format:
          - ''
          - '&c&lPedido de Party Expirado'
          - ' &c&l│ &fO pedido de party de &6{sender} &fexpirou.'
          - ''
