duel-requests:
  accepted: '&aYou accepted the duel request from &b{name-color}{player}&a!'
duel:
  request:
    sent:
      solo:
        format:
          - ''
          - '&b&lDuel Request'
          - ' &b&l│ &fTarget: &b{name-color}{target}'
          - ' &b&l│ &fKit: &b{kit}'
          - ' &b&l│ &fArena: &b{arena}'
          - ''
      party:
        format:
          - ''
          - '&b&lParty Duel Request'
          - ' &b&l│ &fTarget: &b{name-color}{target}&f from Party &b(&a{party-size}&b)'
          - ' &b&l│ &fKit: &b{kit}'
          - ' &b&l│ &fArena: &b{arena}'
          - ''
    received:
      solo:
        clickable:
          format: ' &a(Click to accept)'
          command: /accept {sender}
          hover: '&aClick to accept &b{sender}&a''s duel request.'
        format:
          - ''
          - '&b&lDuel Request'
          - ' &b&l│ &fFrom: &b{name-color}{sender}'
          - ' &b&l│ &fArena: &b{arena}'
          - ' &b&l│ &fKit: &b{kit}'
          - '{clickable}'
          - ''
      party:
        clickable:
          format: ' &a(Click to accept)'
          command: /accept {sender}
          hover: '&aClick to accept the party duel request from &b{sender}&a.'
        format:
          - ''
          - '&b&lParty Duel Request'
          - ' &b&l│ &fFrom: &b{name-color}{sender}&f from Party &b(&a{party-size}&b)'
          - ' &b&l│ &fArena: &b{arena}'
          - ' &b&l│ &fKit: &b{kit}'
          - '{clickable}'
          - ''
    expired:
      sender:
        enabled: true
        format:
          - ''
          - '&c&lDuel Request Expired'
          - ' &c&l│ &fYour duel request to &b{target} &fhas expired.'
          - ''
      target:
        enabled: true
        format:
          - ''
          - '&c&lDuel Request Expired'
          - ' &c&l│ &fThe duel request from &b{sender} &fhas expired.'
          - ''
ffa:
  killstreak-alert:
    enabled: true
    interval: 5
    message:
      - ''
      - '&b&lKillstreak'
      - ' &b&l│ &f{name-color}{player} &fis on a killstreak of &b{killstreak} &fkills!'
      - ''
  combat-log:
    death-message: '&7(Combat Log) &c{name-color}{player} &fwas killed by &c{killer-name-color}{killer}&f.'
  teleported-to-safe-zone: '&aYou have been teleported to the safe zone.'
  player:
    join-message:
      enabled: false
      format:
        - '&a{name-color}{player} &ajoined the FFA match.'
    left-message:
      enabled: false
      format:
        - '&c{name-color}{player} &cleft the FFA match.'
    death:
      no-killer-message:
        enabled: true
        format:
          - '&c{name-color}{player} &fdied!'
      killed-message:
        enabled: true
        format:
          - '&c{name-color}{player} &fwas killed by &c{killer-name-color}{killer}&f!'
game:
  cannot-drop-sword: '&cYou cannot drop your sword!'
match:
  death-message:
    generic: '&c&lDEATH! &f{name-color}{player} &fdied.'
    generic-killer: '&c&lKILLED! &f{name-color}{victim} &fwas killed by &c{killer-name-color}{killer}&f.'
    custom: '&c&lKILLED! &f{message}'
  seeker-respawned: '&c&lDEATH! &fThe seeker &c{name-color}{player} &fhas respawned.'
  started:
    kit-disclaimer:
      enabled: true
      format:
        - ''
        - '&b&l{kit-name}'
        - ' &b&l│ &f{kit-disclaimer}'
        - ''
    message:
      regular:
        enabled: true
        format:
          - '&aThe match has started!'
      round:
        enabled: true
        format:
          - '&aRound &b{current-round} &ahas started.'
  elevator:
    no-safe-spot-found: '&cNo safe spot found for teleportation!'
  cannot-interact-during-match: '&cYou cannot interact with this during a match!'
  cannot-interact-as-raider: '&cYou cannot interact with this as a raider!'
  cannot-place-blocks-during-hiding-phase: '&cYou cannot place blocks during the hiding phase!'
  cannot-place-blocks-above-height-limit: '&cYou cannot place blocks above the height limit!'
  cannot-build-near-portal: '&cYou cannot build near a portal!'
  cannot-break-blocks-during-hiding-phase: '&cYou cannot break blocks during the hiding phase!'
  cannot-break-own-bed: '&cYou cannot break your own bed!'
  starting:
    message:
      enabled: true
      format:
        - '&a{stage}...'
  round-starting:
    message:
      enabled: true
      format:
        - '&a{stage}...'
  respawning:
    message:
      enabled: true
      format:
        - '&a{seconds}...'
  ending:
    time-limit-exceeded:
      format:
        - '&cThe match ended due to reaching the time limit of &b{time-limit} minutes&c.'
  scored:
    enabled: true
    format:
      solo:
        - ''
        - '{winner-color}&l{scorer} &b&lscored!'
        - '{winner-color}&l{winner-goals} &7- {loser-color}&l{loser-goals}'
        - ''
      team:
        - ''
        - '{winner-color}&l{winner}''s Team &b&lscored!'
        - '{winner-color}&l{winner-goals} &7- {loser-color}&l{loser-goals}'
        - ''
  bed-destruction:
    enabled: true
    format:
      - ''
      - '&b&lBED DESTROYED! &b{bed-color}{bed} &fwas destroyed by &b{breaker-color}{breaker}&f!'
      - ''
  ended:
    spectators-list:
      - '&b&lSpectators: &f{spectators} &7(and &b{more_count} &7more...)'
    match-result:
      regular:
        format:
          - ''
          - '&b&lMatch Results: &7(click to view)'
          - '&aWinner: &f{winner} &7| &cLoser: &f{loser}'
          - ''
        winner:
          command: /inventory {winner}
          hover: '&aClick to view {winner}''s inventory'
        loser:
          command: /inventory {loser}
          hover: '&cClick to view {loser}''s inventory'
    elo-changes:
      enabled: true
      format:
        - '&b&lElo Changes'
        - ' &b&l│ &f{winner} &a+{math-winner-elo} &7(&f{old-winner-elo} &7-> &f{new-winner-elo})'
        - ' &b&l│ &f{loser} &c-{math-loser-elo} &7(&f{old-loser-elo} &7-> &f{new-loser-elo})'
        - ''
  blocks-reset:
    enabled: true
    format:
      - '&4{name-color}{player} &fdecided to reset the blocks!'
  platform-decay:
    will-no-longer-decay:
      - '&c&lThe platform will no longer decay!'
    notifications:
      '75':
        format:
          - '&bThe arena has started to decay...'
      '50':
        format:
          - '&e&lWARNING! &eThe arena has shrunk by half!'
      '25':
        format:
          - '&c&lDANGER! &cThe platform is collapsing fast!'
  versus-message:
    solo:
      enabled: true
      format:
        - '&7[&bMatch&7] &b{playerA} &avs &b{playerB}'
    team:
      enabled: true
      format:
        - '&7[&bMatch&7] &b{teamA-leader}''s Party &7(&a{teamA-size}&7) &avs &b{teamB-leader}''s Party &7(&a{teamB-size}&7)'
party:
  invitation:
    received:
      clickable:
        format: ' &a(Click to accept)'
        command: /party accept {sender}
        hover: '&aClick to accept the party invitation from &b{sender}&a.'
      format:
        - ''
        - '&b&lParty Invitation'
        - ' &b&l│ &fFrom: &b{name-color}{sender}'
        - ' &b&l│ &fPlayers: &b{party-size}&f/&bN/A'
        - '{clickable}'
        - ''
    sent:
      format:
        - ''
        - '&b&lParty Invitation Sent'
        - ' &b&l│ &fTarget: &b{name-color}{target}'
        - ''
  announcement:
    clickable:
      format: ' &a(Click to join)'
      command: /party join {leader}
      hover: '&aClick to join &b{leader}&a''s party.'
    format:
      - ''
      - '&b&lPublic Party Announcement'
      - ' &b&l│ &fLeader: &b{name-color}{leader}'
      - ' &b&l│ &fPlayers: &b{party-size}&f/&bN/A'
      - '{clickable}'
      - ''
  request:
    expired:
      sender:
        enabled: true
        format:
          - ''
          - '&c&lParty Request Expired'
          - ' &c&l│ &fYour party request to &b{target} &fhas expired.'
          - ''
      target:
        enabled: true
        format:
          - ''
          - '&c&lParty Request Expired'
          - ' &c&l│ &fThe party request from &b{sender} &fhas expired.'
          - ''