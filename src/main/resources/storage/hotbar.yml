#   ─────────────────────────────────────────────────────────────────────────────────────
#   List of available menus to use:
#
#   UNRANKED_MENU              - Opens the default unranked queue menu
#   LAYOUT_EDITOR_MENU         - Opens the kit layout editor
#   CURRENT_MATCHES_MENU       - Opens a menu with ongoing matches
#   SETTINGS_MENU              - Opens the player settings menu (/practicesettings)
#   HOST_EVENTS_MENU           - Opens the events hosting menu
#   LEADERBOARD_MENU           - Opens the leaderboards/statistics menu
#   PARTY_EVENT_MENU           - Opens the party event menu to start an event
#   PARTY_DUEL_MENU            - Opens the party duel menu
#   SPECTATOR_TELEPORTER_MENU  - Opens the spectator teleport menu
#   RANKED_MENU                - Opens the ranked queue menu
#   UNRANKED_DUO_MENU          - Opens the unranked duo queue menu
#   ─────────────────────────────────────────────────────────────────────────────────────

