layout-menu:
  type: DEFAULT

menus:
  snapshot-menu:
    title: "&b&l{name}'s Inventory"
    buttons:
      hits:
        name: "&b&lHits: {hits}"
        lore:
          - " &fCriticals: &b{critical_hits}"
          - " &fBlocked: &b{blocked_hits}"
          - " &fBest Combo: &b{longest_combo}"
          - ""
          - "&b&lPlayer"
          - " &fW-Taps: &b{w_taps}"
        item: "DIAMOND_SWORD"
        durability: 0
      potions:
        name: "&b&lHealth Potions"
        lore:
          - " &fRemaining: &b{potions_remaining}"
          - " &fThrown: &b{potions_thrown}"
          - " &fWasted: &b{potions_wasted}{heart}"
          - " &fMissed: &b{potions_missed}"
          - " &fAccuracy: &b{potion_accuracy}"
        item: "POTION"
        durability: 16421
      potion_effects:
        name: "&b&lPotion Effects"
        empty-lore:
          - " &cNone."
        lore-header: " &fActive Effects: &b{count}"
        effect-line: " &7{effect}"
        item: "BREWING_STAND_ITEM"
        durability: 0
      food:
        name: "&b&lHunger Level"
        lore:
          - " &fLevel: &b{food_level}"
          - " &fSaturation: &b{saturation}"
        item: "COOKED_BEEF"
        durability: 0
      health:
        name: "&b&lHealth"
        lore:
          - " &fHealth: &b{health} {heart}"
          - " &fAbsorption: &b{absorption}"
        item: "GOLDEN_APPLE"
        durability: 0
      opponent:
        slot: 53
      armor:
        slots: [ 36, 37, 38, 39 ]
  spectator-teleport:
    title: "&b&lSpectator Menu"
    buttons:
      match-info-button:
        slot: 4
        glass-durability: 15
        name: "&b&lMatch Information"
        lore:
          - " &f◆ &bKit: &f{kit}"
          - " &f◆ &bArena: &f{arena}"
          - " &f◆ &bPlayers: &f{players}"
      spectator-teleport-button:
        name: "{player-color}{username}"
        lore:
          - " &f◆ &bPing: &f{ping}ms"
          - " &f◆ &bTeam: &f{team}"
          - " &f◆ &bELO: &f{elo}"
          - ""
          - "&b&lLEFT-CLICK &fto teleport to this player."
          - "&b&lRIGHT-CLICK &fto view their statistics."