layout-menu:
  type: DEFAULT

menus:
  snapshot-menu:
    title: "&6&lInventário de {name}"
    buttons:
      hits:
        name: "&6&lHits: {hits}"
        lore:
          - " &fCríticos: &6{critical_hits}"
          - " &fBloqueados: &6{blocked_hits}"
          - " &fMelhor Combo: &6{longest_combo}"
          - ""
          - "&6&lJogador"
          - " &fW-Taps: &6{w_taps}"
        item: "DIAMOND_SWORD"
        durability: 0
      potions:
        name: "&6&lPoções de Vida"
        lore:
          - " &fRestantes: &6{potions_remaining}"
          - " &fArremessadas: &6{potions_thrown}"
          - " &fDesperdiçadas: &6{potions_wasted}{heart}"
          - " &fErradas: &6{potions_missed}"
          - " &fPrecisão: &6{potion_accuracy}"
        item: "POTION"
        durability: 16421
      potion_effects:
        name: "&6&lEfeitos de Poção"
        empty-lore:
          - " &cNenhum."
        lore-header: " &fEfeitos Ativos: &6{count}"
        effect-line: " &7{effect}"
        item: "BREWING_STAND_ITEM"
        durability: 0
      food:
        name: "&6&lNível de Fome"
        lore:
          - " &fNível: &6{food_level}"
          - " &fSaturação: &6{saturation}"
        item: "COOKED_BEEF"
        durability: 0
      health:
        name: "&6&lVida"
        lore:
          - " &fVida: &6{health} {heart}"
          - " &fAbsorption: &6{absorption}"
        item: "GOLDEN_APPLE"
        durability: 0
      opponent:
        slot: 53
      armor:
        slots: [ 36, 37, 38, 39 ]
  spectator-teleport:
    title: "&6&lMenu de Espectador"
    buttons:
      match-info-button:
        slot: 4
        glass-durability: 15
        name: "&6&lInformações da Partida"
        lore:
          - " &f◆ &6Kit: &f{kit}"
          - " &f◆ &6Arena: &f{arena}"
          - " &f◆ &6Jogadores: &f{players}"
      spectator-teleport-button:
        name: "{player-color}{username}"
        lore:
          - " &f◆ &6Ping: &f{ping}ms"
          - " &f◆ &6Time: &f{team}"
          - " &f◆ &6ELO: &f{elo}"
          - ""
          - "&6&lCLIQUE ESQUERDO &fpara se teleportar até este jogador."
          - "&6&lCLIQUE DIREITO &fpara ver as estatísticas dele."
